camera:
  device_id: 0
  width: 640
  height: 480
  fps: 30
  focal_length_px: 600.0

detector:
  model_path: "models/target.onnx"
  conf_threshold: 0.45
  nms_threshold: 0.40
  input_size: 640

tracker:
  max_lost_frames: 15
  search_radius: 50.0

pid:
  yaw:
    kp: 2.5
    ki: 0.05
    kd: 0.4
    integral_limit: 3.0
    output_limit: 30.0
  pitch:
    kp: 2.0
    ki: 0.03
    kd: 0.3
    integral_limit: 3.0
    output_limit: 25.0

serial:
  port: "/dev/ttyUSB0"
  baudrate: 115200